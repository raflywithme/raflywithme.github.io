    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #FF4D4D;
            --secondary-text: #666;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --card-bg: #f9f9f9;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --secondary-text: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: var(--transition);
            overflow-x: hidden;
        }

        .no-transition * {
            transition: none !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text-color);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .hero {
            padding: 80px 0 40px;
            text-align: center;
        }

        .avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            border: 2px dashed var(--accent-color);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero h3 {
            font-weight: 400;
            color: var(--secondary-text);
            font-size: 1.1rem;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
        }

        .socials a {
            color: var(--text-color);
            transition: var(--transition);
        }

        .socials a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        #theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            padding: 5px;
        }

        footer {
            text-align: center;
            padding: 60px 0 30px;
            font-size: 0.85rem;
            color: var(--secondary-text);
        }

        .heart {
            color: var(--accent-color);
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            padding: 6px;
            border-radius: 6px;
            transition: var(--transition);
            z-index: 1100;
            position: relative;
        }

        .hamburger-btn:hover {
            color: var(--accent-color);
        }

        .hamburger-btn svg {
            display: block;
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            fill: none;
        }

        .nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .nav-overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .hamburger-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: auto;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: 0;
                width: 70%;
                max-width: 280px;
                height: 100vh;
                background: var(--nav-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 32px;
                padding: 0;
                border-left: 1px solid rgba(0, 0, 0, 0.05);
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
                transform: translateX(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1000;
            }

            .nav-links.open {
                transform: translateX(0);
            }

            .nav-links a {
                font-size: 1.1rem;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <nav>

                <button id="hamburger-btn" class="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
                    <svg id="icon-menu" viewBox="0 0 24 24">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                    <svg id="icon-close" viewBox="0 0 24 24" style="display:none">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
                <div class="nav-links" id="nav-links">
                    <a href="https://raflywithme.my.id/"><i data-feather="home"></i> Beranda</a>
                    <a href="https://raflywithme.my.id/about/"><i data-feather="user"></i> Tentang</a>
                    <a href="https://github.com/raflywithme"><i data-feather="github"></i></a>
                    <button id="theme-toggle" onclick="toggleTheme()">
                        <i id="theme-icon" data-feather="moon"></i>
                    </button>
                </div>
            </nav>
            <div class="nav-overlay" id="nav-overlay"></div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="avatar-container">
                <img src="https://raflywithme.my.id/images/avatar.png" alt="Muhammad Rafli">

                <a href="https://www.linkedin.com/in/rexdzx" target="_blank"><i data-feather="linkedin"></i></a>
                <a href="https://www.facebook.com/rexdzx" target="_blank"><i data-feather="facebook"></i></a>
            </div>

    <footer>
        <div class="container">
            <p>&copy; 2023 - <span id="year">2026</span> Muhammad Rafli</p>
        </div>
    </footer>

    <script>
        feather.replace();

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');

            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.setAttribute('data-feather', 'moon');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.setAttribute('data-feather', 'sun');
            }
            feather.replace();
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('theme-icon').setAttribute('data-feather', 'sun');
            feather.replace();
        }

        if (document.getElementById('year')) {
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navLinks = document.getElementById('nav-links');
        const navOverlay = document.getElementById('nav-overlay');
        const iconMenu = document.getElementById('icon-menu');
        const iconClose = document.getElementById('icon-close');

        function openMenu() {
            navLinks.classList.add('open');
            navOverlay.classList.add('active');
            hamburgerBtn.setAttribute('aria-expanded', 'true');
            iconMenu.style.display = 'none';
            iconClose.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            navLinks.classList.remove('open');
            navOverlay.classList.remove('active');
            hamburgerBtn.setAttribute('aria-expanded', 'false');
            iconMenu.style.display = 'block';
            iconClose.style.display = 'none';
            document.body.style.overflow = '';
        }

        hamburgerBtn.addEventListener('click', () => {
            if (navLinks.classList.contains('open')) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        navOverlay.addEventListener('click', closeMenu);

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            document.body.classList.add('no-transition');
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                document.body.classList.remove('no-transition');
            }, 400);

            if (window.innerWidth > 768 && navLinks.classList.contains('open')) {
                closeMenu();
            }
        });
    </script>

</body>
